services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: groupcup
      POSTGRES_PASSWORD: groupcup
      POSTGRES_DB: groupcup
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  pg_data:
  redis_data:
