# Production compose for the deployed web app (landing + /demo). The web
# demo is a front-end mock, so no postgres or redis here; local bot dev can
# run its own containers.
services:
  app:
    image: registry.emperorjs.com/emperorjs/groupcup:latest
    container_name: groupcup-app
    restart: unless-stopped
    pull_policy: always
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_NODE_ENV=production
    ports:
      - "3000"
